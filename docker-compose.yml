services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shorturl
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  url-service:
    build:
      context: ./url-service
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: url_service
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/shorturl
      - QUARKUS_DATASOURCE_USERNAME=admin
      - QUARKUS_DATASOURCE_PASSWORD=admin
      - JAVA_OPTS_APPEND=-Duser.timezone=America/Argentina/Buenos_Aires

volumes:
  postgres_data: