server:
  port: 8081

spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/smartlink-hub
  cloud:
    gateway:
      observability:
        enabled: true
      routes:
        - id: url-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/urls/**

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, metrics

  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always

  tracing:
    sampling:
      probability: 1.0

  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
      protocol: http/protobuf

  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

---
spring:
  config:
    activate:
      on-profile: docker

management:
  otlp:
    tracing:
      endpoint: http://jaeger:4318/v1/traces