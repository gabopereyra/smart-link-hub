global:
  scrape_interval: 15s

scrape_configs:
  - job_name: url-service
    static_configs:
      - targets: ['url-service:8080']
    metrics_path: /q/metrics

  - job_name: analytics-service
    static_configs:
      - targets: ['analytics-service:8082']
    metrics_path: /q/metrics

  - job_name: ai-service
    static_configs:
      - targets: ['ai-service:8083']
    metrics_path: /q/metrics

  - job_name: gateway
    static_configs:
      - targets: ['gateway:8081']
    metrics_path: /actuator/prometheus
