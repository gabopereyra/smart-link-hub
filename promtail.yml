clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)          # Remueve el slash inicial
        target_label: container
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: job
        replacement: $1
    pipeline_stages:
      - json:                 # Permite parsear el JSON que genera Quarkus
          expressions:
            level: level
            traceId: traceId
      - labels:
          level:              # Convierte campos JSON en labels de Loki
          traceId: