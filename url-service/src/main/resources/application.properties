quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=admin
quarkus.datasource.password=admin
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/shorturl
quarkus.swagger-ui.path=/docs
quarkus.hibernate-orm.database.generation=update
quarkus.devservices.enabled=false
quarkus.smallrye-health.enabled=true

quarkus.oidc.auth-server-url=http://localhost:8180/realms/smartlink-hub
quarkus.oidc.application-type=service
quarkus.oidc.client-id=smartlink-gateway

quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4317
quarkus.otel.traces.sampler=parentbased_traceidratio
quarkus.otel.traces.sampler.arg=1.0
quarkus.otel.service.name=url-service

# Formato JSON para Promtail/Loki
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.exception-output-type=formatted

# Campos ˙tiles para Loki labels/queries
quarkus.log.console.json.additional-field.service=url-service
quarkus.log.console.json.additional-field.environment=local

# Conector RabbitMQ
mp.messaging.outgoing.url_clicked_out.connector=smallrye-rabbitmq
mp.messaging.outgoing.url_clicked_out.host=localhost
mp.messaging.outgoing.url_clicked_out.port=5672
mp.messaging.outgoing.url_clicked_out.username=admin
mp.messaging.outgoing.url_clicked_out.password=secret
mp.messaging.outgoing.url_clicked_out.exchange.name=url_clicked_exchange
mp.messaging.outgoing.url_clicked_out.exchange.type=direct
mp.messaging.outgoing.url_clicked_out.default-routing-key=url_clicked

quarkus.rest-client.ai-service.url=http://localhost:8083

## Properties for Docker enviroment:
%docker.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/shorturl

%docker.quarkus.oidc.auth-server-url=http://keycloak:8080/realms/smartlink-hub

%docker.mp.messaging.outgoing.url_clicked_out.host=rabbitmq
%docker.quarkus.rest-client.ai-service.url=http://ai-service:8083
%docker.quarkus.otel.exporter.otlp.traces.endpoint=http://jaeger:4317

%docker.quarkus.log.console.json.additional-field.environment=docker